<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>한국문화체험회</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      background: #fffdf7;
      overflow-x: hidden;
      font-family: sans-serif;
      color: #333;
      margin: 0;
    }

    .sakura {
      position: fixed;
      top: -10px;
      color: #f4b6c2;
      font-size: 24px;
      animation: fall linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(120vh) rotate(360deg);
        opacity: 0;
      }
    }

    .fade-up {
      animation: fadeUp 1s ease forwards;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="sakura" style="left:5%; animation-duration:10s;">🌸</div>
  <div class="sakura" style="left:15%; animation-duration:12s;">🌸</div>
  <div class="sakura" style="left:25%; animation-duration:9s;">🌸</div>
  <div class="sakura" style="left:35%; animation-duration:13s;">🌸</div>
  <div class="sakura" style="left:45%; animation-duration:11s;">🌸</div>
  <div class="sakura" style="left:55%; animation-duration:14s;">🌸</div>
  <div class="sakura" style="left:65%; animation-duration:10s;">🌸</div>
  <div class="sakura" style="left:75%; animation-duration:12s;">🌸</div>
  <div class="sakura" style="left:85%; animation-duration:15s;">🌸</div>

  <section class="min-h-screen flex items-center justify-center bg-gradient-to-b from-pink-100 to-orange-50 relative z-10">

    <div class="text-center px-6 fade-up">

      <div class="w-80 h-80 rounded-3xl mx-auto shadow-2xl mb-8 overflow-hidden">
        <img
          src="group.jpg"
          class="w-full h-full object-cover"
        />
      </div>

      <h1 class="text-5xl font-bold mb-6">
        한국문화체험회
      </h1>

      <div class="flex gap-4 justify-center flex-wrap">
        <a href="#schedule"
          class="bg-pink-300 hover:bg-pink-400 transition px-6 py-3 rounded-full shadow">
          행사 일정 보기
        </a>

        <a href="#location"
          class="bg-white hover:bg-pink-50 transition px-6 py-3 rounded-full shadow">
          오시는 길
        </a>
      </div>

    </div>
  </section>

  <section id="schedule" class="max-w-6xl mx-auto px-6 py-24 relative z-10">

    <h2 class="text-4xl font-bold text-center mb-16">
      행사 일정
    </h2>

    <div class="grid md:grid-cols-2 gap-6">

      <div class="bg-white rounded-3xl shadow-lg p-8">
        <p class="text-pink-500 font-bold mb-2">4:00 ~ 4:30</p>
        <h3 class="text-2xl font-bold">화채 만들기</h3>
      </div>

      <div class="bg-white rounded-3xl shadow-lg p-8">
        <p class="text-pink-500 font-bold mb-2">5:00 ~ 6:00</p>
        <h3 class="text-2xl font-bold">인생네컷</h3>
      </div>

      <div class="bg-white rounded-3xl shadow-lg p-8">
        <p class="text-pink-500 font-bold mb-2">6:20 ~ 7:00</p>
        <h3 class="text-2xl font-bold">게임</h3>
      </div>

      <div class="bg-white rounded-3xl shadow-lg p-8">
        <p class="text-pink-500 font-bold mb-2">7:30 ~ 8:00</p>
        <h3 class="text-2xl font-bold">교제</h3>
      </div>

    </div>
  </section>

  <section class="max-w-6xl mx-auto px-6 py-24 relative z-10">

  <h2 class="text-4xl font-bold text-center mb-16">
    작년 활동
  </h2>

  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">

    <div class="bg-white rounded-3xl shadow-lg p-6">
      <img
        src="activity1.JPG"
        class="w-full rounded-2xl mb-4 shadow-md"
      />
